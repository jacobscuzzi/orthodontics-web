backend:
  name: github
  repo: jacobscuzzi/orthodontics-web
  branch: main

# Lokal mit `npx @sveltia/cms-proxy-server` testen. Ohne Token-Login,
# direkter Zugriff aufs Dateisystem. Hat keinen Effekt im Production-Build.
local_backend: true

media_folder: "public/uploads"
public_folder: "/uploads"

# Dateinamen ohne Umlaute/Sonderzeichen erzeugen (z.B. "Frühbehandlung" -> "fruehbehandlung")
slug:
  encoding: ascii
  clean_accents: true

collections:
  - name: "pages"
    label: "Seiten"
    icon: "web"
    description: "Inhalte und Bilder der einzelnen Website-Seiten"
    editor:
      preview: false
    files:
      - name: "home"
        label: "Startseite"
        file: "src/content/pages/home.md"
        fields:
          - { name: title, label: "Interner Titel", widget: string, hint: "Wird nicht auf der Website angezeigt." }
          - { name: heroTitle, label: "Große Überschrift im Titelbild", widget: string, hint: "Wörter zwischen *Sternchen* werden farblich hervorgehoben, z.B. Kieferorthopädie auf *Alt-Stralau*." }
          - { name: heroImage, label: "Titelbild", widget: image }
          - { name: heroAlt, label: "Titelbild-Beschreibung (für Vorlesefunktion & Google)", widget: string, required: false }
          - { name: heroCredit, label: "Foto-Credit (unten rechts im Bild, optional)", widget: string, required: false, hint: "Kompletter Text, z.B. „Foto: Robert Grahn“. Leer = keine Anzeige." }
          - { name: heroCtaPrimaryLabel, label: "Beschriftung Haupt-Button (Terminbuchung)", widget: string, required: false }
          - { name: heroCtaSecondaryLabel, label: "Beschriftung zweiter Button (führt zur Praxis-Seite)", widget: string, required: false }
          - name: reviews
            label: "Abschnitt „Bewertungen“"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Kleine Überzeile", widget: string }
              - { name: title, label: "Überschrift", widget: string, hint: "*Sternchen* für Hervorhebung. Die Bewertungen selbst pflegst Du unter „Bewertungen“." }
          - name: features
            label: "Abschnitt „Was uns ausmacht“"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Kleine Überzeile", widget: string }
              - { name: title, label: "Überschrift", widget: string, hint: "*Sternchen* für Hervorhebung." }
              - name: items
                label: "Die drei Punkte"
                widget: list
                summary: "{{fields.title}}"
                fields:
                  - { name: title, label: "Überschrift", widget: string }
                  - { name: text, label: "Text", widget: text }
              - { name: ctaLabel, label: "Beschriftung Button (führt zur Behandlungs-Seite)", widget: string, required: false }
          - { name: interludeTitle, label: "Zwischen-Slogan (über dem durchscheinenden Foto)", widget: string, hint: "*Sternchen* für Hervorhebung." }
          - name: findUs
            label: "Abschnitt „So findest Du zu uns“"
            widget: object
            collapsed: true
            fields:
              - { name: title, label: "Überschrift", widget: string, hint: "*Sternchen* für Hervorhebung. Die Adresse darunter kommt automatisch aus den Stammdaten." }
              - { name: text, label: "Text unter der Adresse", widget: text }
              - { name: ctaLabel, label: "Beschriftung Button (führt zur Kontakt-Seite)", widget: string, required: false }
          - name: faqTeaser
            label: "Abschnitt „Noch Fragen?“"
            widget: object
            collapsed: true
            fields:
              - { name: eyebrow, label: "Kleine Überzeile", widget: string }
              - { name: title, label: "Überschrift", widget: string, hint: "*Sternchen* für Hervorhebung." }
              - { name: text, label: "Text", widget: text }
              - { name: ctaLabel, label: "Beschriftung Button (führt zur FAQ-Seite)", widget: string, required: false }

      - name: "praxis"
        label: "Praxis"
        file: "src/content/pages/praxis.md"
        fields:
          - { name: title, label: "Seitentitel (Browser-Tab)", widget: string }
          - { name: heroEyebrow, label: "Kleine Überzeile im Titelbild", widget: string, required: false }
          - { name: heroTitle, label: "Große Überschrift im Titelbild", widget: string, hint: "*Sternchen* für Hervorhebung." }
          - { name: heroImage, label: "Titelbild", widget: image }
          - { name: heroAlt, label: "Titelbild-Beschreibung", widget: string, required: false }
          - { name: body, label: "Einleitungstext", widget: markdown }
          - { name: teamCtaLabel, label: "Beschriftung Button (führt zur Team-Seite)", widget: string, required: false }
          - { name: galleryEyebrow, label: "Galerie: kleine Überzeile", widget: string, required: false }
          - { name: galleryTitle, label: "Galerie: Überschrift", widget: string, required: false, hint: "*Sternchen* für Hervorhebung." }
          - name: gallery
            label: "Bildergalerie"
            widget: list
            required: false
            summary: "{{fields.alt}}"
            fields:
              - { name: src, label: "Bild", widget: image }
              - { name: alt, label: "Bildbeschreibung", widget: string, required: false }

      - name: "team"
        label: "Team (Seite)"
        file: "src/content/pages/team.md"
        fields:
          - { name: title, label: "Seitentitel (Browser-Tab)", widget: string }
          - { name: heroEyebrow, label: "Kleine Überzeile im Titelbild", widget: string, required: false }
          - { name: heroTitle, label: "Große Überschrift im Titelbild", widget: string, hint: "*Sternchen* für Hervorhebung." }
          - { name: heroImage, label: "Titelbild", widget: image }
          - { name: heroAlt, label: "Titelbild-Beschreibung", widget: string, required: false }
          - { name: cvToggleLabel, label: "Beschriftung Lebenslauf-Aufklapper", widget: string, required: false }
          - { name: body, label: "Einleitungstext (optional)", widget: markdown, required: false, hint: "Leer lassen = kein Intro-Abschnitt. Die einzelnen Team-Mitglieder pflegst Du unter „Team-Mitglieder“." }

      - name: "behandlung"
        label: "Behandlung"
        file: "src/content/pages/behandlung.md"
        fields:
          - { name: title, label: "Seitentitel (Browser-Tab)", widget: string }
          - { name: heroEyebrow, label: "Kleine Überzeile im Titelbild", widget: string, required: false }
          - { name: heroTitle, label: "Große Überschrift im Titelbild", widget: string, hint: "*Sternchen* für Hervorhebung." }
          - { name: heroImage, label: "Titelbild", widget: image }
          - { name: heroAlt, label: "Titelbild-Beschreibung", widget: string, required: false }
          - { name: sectionEyebrow, label: "Wort in der kleinen Überzeile der Abschnitte (z.B. „01 · Behandlung“)", widget: string, required: false }
          - name: sections
            label: "Behandlungs-Abschnitte"
            widget: list
            summary: "{{fields.title}}"
            fields:
              - { name: title, label: "Überschrift", widget: string, hint: "Wörter zwischen *Sternchen* werden farblich hervorgehoben, z.B. Früh*behandlung*." }
              - { name: image, label: "Bild", widget: image, required: false }
              - { name: imageAlt, label: "Bildbeschreibung", widget: string, required: false }
              - { name: body, label: "Text", widget: text }
              - name: bullets
                label: "Stichpunkt-Liste (optional)"
                widget: list
                required: false
                field: { name: item, label: "Stichpunkt", widget: string }

      - name: "faq"
        label: "Frage & Antwort (Seite)"
        file: "src/content/pages/faq.md"
        fields:
          - { name: title, label: "Seitentitel (Browser-Tab)", widget: string }
          - { name: heroEyebrow, label: "Kleine Überzeile im Titelbild", widget: string, required: false }
          - { name: heroTitle, label: "Große Überschrift im Titelbild", widget: string, hint: "*Sternchen* für Hervorhebung." }
          - { name: heroImage, label: "Titelbild", widget: image }
          - { name: heroAlt, label: "Titelbild-Beschreibung", widget: string, required: false }
          - { name: body, label: "Einleitungstext", widget: markdown, hint: "Die einzelnen Fragen pflegst Du unter „Fragen & Antworten“." }

      - name: "kontakt"
        label: "Kontakt"
        file: "src/content/pages/kontakt.md"
        fields:
          - { name: title, label: "Seitentitel (Browser-Tab)", widget: string }
          - { name: heroEyebrow, label: "Kleine Überzeile im Titelbild", widget: string, required: false }
          - { name: heroTitle, label: "Große Überschrift im Titelbild", widget: string, hint: "*Sternchen* für Hervorhebung." }
          - { name: heroImage, label: "Titelbild", widget: image }
          - { name: heroAlt, label: "Titelbild-Beschreibung", widget: string, required: false }
          - { name: labelAddress, label: "Beschriftung „Adresse“", widget: string, required: false }
          - { name: labelContact, label: "Beschriftung „Direkt Kontakt“", widget: string, required: false }
          - { name: labelHours, label: "Beschriftung „Öffnungszeiten“", widget: string, required: false }
          - { name: bookingCtaLabel, label: "Beschriftung Termin-Button", widget: string, required: false }
          - { name: bottomImage, label: "Bild über dem Anfahrtstext", widget: image, required: false }
          - { name: bottomImageAlt, label: "Bildbeschreibung", widget: string, required: false }
          - { name: body, label: "Anfahrtstext", widget: markdown, hint: "Adresse, Telefon und Öffnungszeiten kommen automatisch aus „Website-Daten → Stammdaten & Kontakt“." }

      - name: "impressum"
        label: "Impressum"
        file: "src/content/pages/impressum.md"
        fields:
          - { name: title, label: "Überschrift", widget: string }
          - { name: body, label: "Inhalt", widget: markdown }

      - name: "datenschutz"
        label: "Datenschutz"
        file: "src/content/pages/datenschutz.md"
        fields:
          - { name: title, label: "Überschrift", widget: string }
          - { name: body, label: "Inhalt", widget: markdown }

  - divider: true

  - name: "team"
    label: "Team-Mitglieder"
    icon: "groups"
    description: "Die Personen auf der Team-Seite"
    folder: "src/content/team"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{order}}-{{slug}}"
    identifier_field: name
    summary: "{{fields.order}} · {{fields.name}} – {{fields.role}}"
    sortable_fields: ['order', 'name']
    fields:
      - { name: name, label: "Name", widget: string }
      - { name: role, label: "Rolle / Funktion", widget: string }
      - { name: photo, label: "Foto (optional)", widget: image, required: false }
      - { name: order, label: "Reihenfolge (kleinere Zahl = weiter vorne)", widget: number, default: 100, value_type: int }
      - { name: cv, label: "Lebenslauf (optional, erscheint als Aufklapp-Toggle)", widget: text, required: false }
      - { name: body, label: "Beschreibung", widget: markdown }

  - name: "faq"
    label: "Fragen & Antworten"
    icon: "quiz"
    description: "Die aufklappbaren Fragen auf der FAQ-Seite"
    folder: "src/content/faq"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{order}}-{{slug}}"
    identifier_field: question
    summary: "{{fields.order}} · {{fields.question}}"
    sortable_fields: ['order']
    fields:
      - { name: question, label: "Frage", widget: string }
      - { name: order, label: "Reihenfolge", widget: number, default: 100, value_type: int }
      - { name: body, label: "Antwort", widget: markdown }

  - name: "reviews"
    label: "Bewertungen"
    icon: "reviews"
    description: "Patientenstimmen für die Startseite"
    folder: "src/content/reviews"
    create: true
    extension: "md"
    format: "frontmatter"
    slug: "{{order}}-{{slug}}"
    identifier_field: author
    summary: "{{fields.order}} · {{fields.author}} ({{fields.rating}} Sterne)"
    sortable_fields: ['order', 'author']
    fields:
      - { name: author, label: "Autor (Vorname + Initial)", widget: string }
      - name: rating
        label: "Sterne"
        widget: select
        default: 5
        options: [1, 2, 3, 4, 5]
      - { name: date, label: "Datum", widget: datetime, date_format: "YYYY-MM-DD", time_format: false, required: false }
      - { name: order, label: "Reihenfolge (kleinere Zahl = weiter vorne)", widget: number, default: 100, value_type: int }
      - { name: featured, label: "Auf der Startseite zeigen?", widget: boolean, default: true, hint: "Es erscheinen die ersten drei aktivierten Bewertungen (nach Reihenfolge)." }
      - { name: body, label: "Bewertungstext", widget: text }

  - divider: true

  - name: "site"
    label: "Website-Daten"
    icon: "settings"
    description: "Adresse, Öffnungszeiten, Logo, Farben"
    editor:
      preview: false
    files:
      - name: "contact"
        label: "Stammdaten & Kontakt"
        file: "src/data/site.json"
        fields:
          - name: practice
            label: "Praxis"
            widget: object
            fields:
              - { name: name, label: "Name", widget: string }
              - { name: subtitle, label: "Untertitel", widget: string }
              - { name: street, label: "Straße", widget: string }
              - { name: zip, label: "PLZ", widget: string }
              - { name: city, label: "Ort", widget: string }
              - { name: phone, label: "Telefon", widget: string }
              - { name: email, label: "E-Mail", widget: string }
              - { name: doctolibUrl, label: "Doctolib-Link", widget: string }
          - name: hours
            label: "Öffnungszeiten"
            widget: list
            fields:
              - { name: day, label: "Tag", widget: string }
              - { name: time, label: "Uhrzeit", widget: string }
          - { name: hoursNote, label: "Zusatz zu Öffnungszeiten (z.B. Mittagspause)", widget: string, required: false }
          - { name: logo, label: "Logo", widget: image }
          - { name: metaDescription, label: "Beschreibung für Google (max. ca. 160 Zeichen)", widget: string, hint: "Erscheint als Beschreibungstext in Suchergebnissen." }
          - name: googleReviews
            label: "Google-Bewertungen (Gesamtzahlen)"
            widget: object
            fields:
              - { name: averageRating, label: "Durchschnitt (z.B. 4.9)", widget: number, value_type: float, step: 0.1 }
              - { name: totalCount, label: "Anzahl Bewertungen", widget: number, value_type: int }
              - { name: googleMapsUrl, label: "Google-Maps-Profil-Link", widget: string }
          - { name: mapsEmbedUrl, label: "Google-Maps Embed-URL (iframe src)", widget: string }

      - name: "texts"
        label: "Navigation & feste Texte"
        file: "src/data/ui.json"
        fields:
          - name: nav
            label: "Hauptnavigation"
            widget: list
            hint: "Reihenfolge = Reihenfolge im Menü. Den Link nur ändern, wenn die Seite existiert."
            fields:
              - { name: label, label: "Beschriftung", widget: string }
              - { name: href, label: "Link (z.B. /praxis)", widget: string }
          - { name: bookingCta, label: "Termin-Button (Kopfzeile & mobiler Button)", widget: string }
          - { name: seoTitleSuffix, label: "Zusatz im Browser-Tab der Startseite", widget: string }
          - name: footer
            label: "Fußzeile"
            widget: object
            collapsed: true
            fields:
              - { name: impressum, label: "Link Impressum", widget: string }
              - { name: datenschutz, label: "Link Datenschutz", widget: string }
              - { name: booking, label: "Link Online-Terminbuchung", widget: string }
              - { name: telPrefix, label: "Vorsatz vor der Telefonnummer", widget: string }
          - name: map
            label: "Google-Maps-Platzhalter (Karten-Einwilligung)"
            widget: object
            collapsed: true
            fields:
              - { name: title, label: "Überschrift", widget: string }
              - { name: area, label: "Ortszusatz in der Adresszeile (z.B. Halbinsel Stralau)", widget: string }
              - { name: loadButton, label: "Beschriftung „Karte laden“-Button", widget: string }
              - { name: consentNote, label: "Datenschutz-Hinweis (vor dem Link)", widget: text }
              - { name: consentLinkLabel, label: "Linktext zur Datenschutzerklärung", widget: string }
              - { name: openInMaps, label: "Linktext „in Google Maps öffnen“", widget: string }
          - name: reviews
            label: "Bewertungs-Zeile unter den Bewertungen"
            widget: object
            collapsed: true
            fields:
              - { name: basedOn, label: "Text unter dem Durchschnitt", widget: string, hint: "{anzahl} wird durch die Anzahl der Bewertungen ersetzt." }
              - { name: allLink, label: "Linktext zu allen Google-Bewertungen", widget: string }

      - name: "theme"
        label: "Design / Farbe"
        file: "src/data/theme.json"
        fields:
          - name: activePreset
            label: "Aktives Farbpreset"
            widget: select
            options:
              - { label: "Salbei", value: "sage" }
              - { label: "Grün klassisch", value: "classicGreen" }
              - { label: "Blau", value: "blue" }
          - name: presets
            label: "Farb-Presets (nur mit Unterstützung ändern!)"
            widget: object
            collapsed: true
            fields:
              - name: sage
                label: "Salbei"
                widget: object
                fields:
                  - { name: label, label: "Bezeichnung", widget: string }
                  - { name: primary, label: "Primärfarbe", widget: color }
                  - { name: accent, label: "Akzentfarbe", widget: color }
                  - { name: background, label: "Hintergrund", widget: color }
                  - { name: text, label: "Textfarbe", widget: color }
              - name: classicGreen
                label: "Grün klassisch"
                widget: object
                fields:
                  - { name: label, label: "Bezeichnung", widget: string }
                  - { name: primary, label: "Primärfarbe", widget: color }
                  - { name: accent, label: "Akzentfarbe", widget: color }
                  - { name: background, label: "Hintergrund", widget: color }
                  - { name: text, label: "Textfarbe", widget: color }
              - name: blue
                label: "Blau"
                widget: object
                fields:
                  - { name: label, label: "Bezeichnung", widget: string }
                  - { name: primary, label: "Primärfarbe", widget: color }
                  - { name: accent, label: "Akzentfarbe", widget: color }
                  - { name: background, label: "Hintergrund", widget: color }
                  - { name: text, label: "Textfarbe", widget: color }
